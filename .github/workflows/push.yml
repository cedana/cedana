name: Push

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      debug_build:
        type: boolean
        description: "Run build with debugging enabled"
        required: false
        default: false
      debug_test:
        type: boolean
        description: "Run tests with debugging enabled"
        required: false
        default: false
      debug_bench:
        type: boolean
        description: "Run benchmark with debugging enabled"
        required: false
        default: false
      debug_publish:
        type: boolean
        description: "Run publish with debugging enabled"
        required: false
        default: false

concurrency:
  group: ${{ github.repository }}-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      debug: ${{ startsWith(github.event_name, 'workflow') && inputs.debug_build }}
      cedana: true
      plugins: true
      image: true
      image_name: cedana/cedana-helper-test

  download:
    name: Download
    uses: ./.github/workflows/download.yml
    secrets: inherit
    with:
      criu_version: criu-dev
      gpu_version: main
      streamer_version: main
      helm_chart_version: main
      controller_version: main
      containerd_runtime_version: cedana
      slurm_version: feat/fix-checkpoint

  test_slurm:
    name: Test SLURM
    uses: ./.github/workflows/test_slurm.yml
    needs: [build, download]
    secrets: inherit
    with:
      debug: ${{ startsWith(github.event_name, 'workflow') && inputs.debug_test }}
      post_summary: false
