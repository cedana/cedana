name: Publish

permissions:
  contents: write
  packages: write

on:
  workflow_call:
    inputs:
      debug:
        type: boolean
        description: "Run with debugging enabled"
        required: false
        default: false
      github:
        type: boolean
        description: "Publish to GitHub releases"
        required: false
        default: false
      aws_s3:
        type: boolean
        description: "Publish to AWS S3"
        required: false
        default: false
      aws_s3_path:
        type: string
        description: "S3 path to publish to"
        required: false
        default: cedana
      dockerhub:
        type: boolean
        description: "Publish images to DockerHub"
        required: false
        default: false
      dockerhub_latest:
        type: boolean
        description: "Publish latest tag(s) to DockerHub"
        required: false
        default: false
      post_summary:
        type: boolean
        description: "Post summary to Slack"
        required: false
        default: false

jobs:
  github:
    name: GitHub
    if: inputs.github
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
      max-parallel: 1 # DO NOT CHANGE: required to run in order
    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        id: download-binaries-cedana
        with:
          name: cedana-${{ matrix.arch }}

      - name: Download plugins
        uses: actions/download-artifact@v4
        with:
          path: .
          pattern: plugin-${{ matrix.arch }}*
          merge-multiple: true

      - name: Download scripts
        uses: actions/download-artifact@v4
        id: download-scripts
        with:
          name: cedana-scripts-${{ matrix.arch }}

      - name: Setup debugging session
        uses: mxschmitt/action-tmate@v3
        if: inputs.debug
        with:
          limit-access-to-actor: true

      - name: Create tarballs
        run: |
          tar -czf cedana-${{ matrix.arch }}.tar.gz cedana
          find -maxdepth 1 -type f -name "libcedana*.so" -exec sh -c 'f="{}"; base=$(basename "$f" .so); tar -czf "${base}-${{ matrix.arch }}.tar.gz" "$f"' \;

      - name: Create release
        if: matrix.arch == 'amd64'
        id: create-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.head_ref || github.ref_name }}
        run: |
          gh release create "$tag" \
              --repo="$GITHUB_REPOSITORY" \
              --title="$tag" \
              --generate-notes

      - name: Upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.head_ref || github.ref_name }}
        run: |
          gh release upload --clobber "$tag" \
              --repo="$GITHUB_REPOSITORY" \
              *.tar.gz \
              install-release.sh

  aws_s3:
    name: Cedana Binary Upload to Propagator
    if: inputs.aws_s3
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64

    permissions:
      id-token: write # required for OIDC
      contents: read

    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: cedana-${{ matrix.arch }}

      - name: Upload cedana to Propagator
        env:
          CEDANA_URL: "https://rahul.cedana.ai/v2"
          CEDANA_AUTH_TOKEN: ${{ secrets.CEDANA_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          FILE="cedana"
          REF="${{ github.head_ref || github.ref_name }}"
          ARCH="${{ matrix.arch }}"

          CHECKSUM="$(
            python3 - <<'PY' "$FILE"
          import sys, zlib, base64, struct
          path = sys.argv[1]
          with open(path, "rb") as f:
              crc = zlib.crc32(f.read()) & 0xffffffff
          print(base64.b64encode(struct.pack(">I", crc)).decode())
          PY
          )"

          echo "Querying propagator ..."
          RESPONSE="$(
            curl -sS --fail \
              "${CEDANA_URL}/plugins/upload/${FILE}?repository=cedana&version=${REF}&arch=${ARCH}&build=alpha&checksum=${CHECKSUM}" \
              -H "Authorization: Bearer $CEDANA_AUTH_TOKEN"
          )"

          VERSION_UPLOAD_URL="$(echo "$RESPONSE" | jq -r '.version_upload_url')"
          LATEST_UPLOAD_URL="$(echo "$RESPONSE" | jq -r '.latest_upload_url')"

          test -n "$VERSION_UPLOAD_URL" && [ "$VERSION_UPLOAD_URL" != "null" ] || {
            echo "version_upload_url missing in response: $RESPONSE"
            exit 1
          }

          test -n "$LATEST_UPLOAD_URL" && [ "$LATEST_UPLOAD_URL" != "null" ] || {
            echo "latest_upload_url missing in response: $RESPONSE"
            exit 1
          }

          echo "Uploading Binary ..."
          for URL in "$VERSION_UPLOAD_URL" "$LATEST_UPLOAD_URL"; do
            curl -sS --fail -X PUT "$URL" \
              -H "Content-Type: application/octet-stream" \
              -H "x-amz-meta-version: ${REF}" \
              -H "x-amz-checksum-crc32: ${CHECKSUM}" \
              -H "x-amz-sdk-checksum-algorithm: CRC32" \
              --upload-file "$FILE"
          done

  aws_s3_plugin:
    name: Plugin Upload to Propagator
    if: inputs.aws_s3
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 15
      matrix:
        plugin:
          - runc
          - containerd
          - crio
          - kata
          - cloud-hypervisor
          - k8s
          - slurm
          - storage/cedana
          - storage/s3
          - storage/gcs
        arch:
          - amd64
          - arm64
    steps:
      - name: Set plugin name
        env:
          PLUGIN: ${{ matrix.plugin }}
        run: |
          PLUGIN=$(echo $PLUGIN | sed 's/\//-/g')
          echo "PLUGIN=$PLUGIN" >> $GITHUB_ENV

      - name: Download plugin
        uses: actions/download-artifact@v4
        id: download-plugin
        with:
          name: plugin-${{ matrix.arch }}-${{ env.PLUGIN }}

      - name: Upload plugin to Propagator
        env:
          CEDANA_URL: "https://rahul.cedana.ai/v2"
          CEDANA_AUTH_TOKEN: ${{ secrets.CEDANA_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          FILE="libcedana-${PLUGIN}.so"
          REF="${{ github.head_ref || github.ref_name }}"
          ARCH="${{ matrix.arch }}"
          CHECKSUM="$(
            python3 - <<'PY' "$FILE"
          import sys, zlib, base64, struct
          path = sys.argv[1]
          with open(path, "rb") as f:
              crc = zlib.crc32(f.read()) & 0xffffffff
          print(base64.b64encode(struct.pack(">I", crc)).decode())
          PY
          )"

          echo "Querying propagator ..."
          RESPONSE="$(
            curl -sS --fail \
              "${CEDANA_URL}/plugins/upload/${FILE}?repository=cedana&version=${REF}&arch=${ARCH}&build=alpha&checksum=${CHECKSUM}" \
              -H "Authorization: Bearer $CEDANA_AUTH_TOKEN"
          )"

          VERSION_UPLOAD_URL="$(echo "$RESPONSE" | jq -r '.version_upload_url')"
          LATEST_UPLOAD_URL="$(echo "$RESPONSE" | jq -r '.latest_upload_url')"

          test -n "$VERSION_UPLOAD_URL" && [ "$VERSION_UPLOAD_URL" != "null" ] || {
            echo "version_upload_url missing in response: $RESPONSE"
            exit 1
          }

          test -n "$LATEST_UPLOAD_URL" && [ "$LATEST_UPLOAD_URL" != "null" ] || {
            echo "latest_upload_url missing in response: $RESPONSE"
            exit 1
          }

          echo "Uploading Binary ..."
          for URL in "$VERSION_UPLOAD_URL" "$LATEST_UPLOAD_URL"; do
            curl -sS --fail -X PUT "$URL" \
              -H "Content-Type: application/octet-stream" \
              -H "x-amz-meta-version: ${REF}" \
              -H "x-amz-checksum-crc32: ${CHECKSUM}" \
              -H "x-amz-sdk-checksum-algorithm: CRC32" \
              --upload-file "$FILE"
          done

  dockerhub:
    name: DockerHub (multi-arch)
    if: inputs.dockerhub
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Download image name
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: /tmp/image-name
          name: image-name
          merge-multiple: true

      - name: Download digests (test, latest)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: /tmp/test-digests-latest
          pattern: test-digests-latest-*
          merge-multiple: true

      - name: Download digests (test, CUDA)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: /tmp/test-digests-cuda
          pattern: test-digests-cuda-*
          merge-multiple: true

      - name: Download image name (test)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: /tmp/test-image-name
          name: test-image-name

      - name: Check directories and set variables
        id: check_dirs
        run: |
          if [ -d /tmp/digests ]; then
            echo "DIGESTS_EXISTS=true" >> $GITHUB_OUTPUT
            echo "IMAGE_NAME=$(cat /tmp/image-name/name.txt)" >> $GITHUB_OUTPUT
          else
            echo "DIGESTS_EXISTS=false" >> $GITHUB_OUTPUT
          fi
          if [ -d /tmp/test-digests-latest ] && [ -d /tmp/test-digests-cuda ]; then
            echo "TEST_DIGESTS_EXISTS=true" >> $GITHUB_OUTPUT
            echo "TEST_IMAGE_NAME=$(cat /tmp/test-image-name/name.txt)" >> $GITHUB_OUTPUT
          else
            echo "TEST_DIGESTS_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker meta
        if: steps.check_dirs.outputs.DIGESTS_EXISTS == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.check_dirs.outputs.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=${{ github.head_ref || github.ref_name }}
            ${{ inputs.dockerhub_latest && 'type=raw,value=latest' || '' }}

      - name: Create manifest list and push
        if: steps.check_dirs.outputs.DIGESTS_EXISTS == 'true'
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ steps.check_dirs.outputs.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        if: steps.check_dirs.outputs.DIGESTS_EXISTS == 'true'
        run: |
          # check if push was successful
          docker buildx imagetools inspect ${{ steps.check_dirs.outputs.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          # check if commit sha matches with the latest commit sha
          # we only match docker hub image as both images should be the same
          echo $(docker run -i --rm ${{ steps.check_dirs.outputs.IMAGE_NAME }}:${{ steps.meta.outputs.version }} -c "cedana -v")

      - name: Docker meta (test, latest)
        if: steps.check_dirs.outputs.TEST_DIGESTS_EXISTS == 'true'
        id: meta-test-latest
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.check_dirs.outputs.TEST_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=${{ github.head_ref || github.ref_name }}
            ${{ inputs.dockerhub_latest && 'type=raw,value=latest' || '' }}

      - name: Create manifest list and push (test, latest)
        if: steps.check_dirs.outputs.TEST_DIGESTS_EXISTS == 'true'
        working-directory: /tmp/test-digests-latest
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ steps.check_dirs.outputs.TEST_IMAGE_NAME }}@sha256:%s ' *)

      - name: Docker meta (test, CUDA)
        if: steps.check_dirs.outputs.TEST_DIGESTS_EXISTS == 'true'
        id: meta-test-cuda
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.check_dirs.outputs.TEST_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=${{ github.head_ref || github.ref_name }}
            ${{ inputs.dockerhub_latest && 'type=raw,value=cuda' || '' }}

      - name: Create manifest list and push (test, CUDA)
        if: steps.check_dirs.outputs.TEST_DIGESTS_EXISTS == 'true'
        working-directory: /tmp/test-digests-cuda
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ steps.check_dirs.outputs.TEST_IMAGE_NAME }}@sha256:%s ' *)

  post-summary:
    name: Post Summary
    runs-on: ubuntu-latest
    needs: ["github", "aws_s3", "dockerhub"]
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
    if: inputs.post_summary
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get tag
        id: tag
        run: |
          echo "tag=$(git tag --sort=-creatordate | sed -n '1p')" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: previous-tag
        run: |
          echo "tag=$(git tag --sort=-creatordate | sed -n '2p')" >> $GITHUB_OUTPUT

      - name: Download previous plugin binaries
        env:
          CEDANA_URL: "https://rahul.cedana.ai/v2"
          CEDANA_AUTH_TOKEN: ${{ secrets.CEDANA_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          PREVIOUS_TAG="${{ steps.previous-tag.outputs.tag }}"
          ARCH="${{ matrix.arch }}"

          BUILD=""
          if [[ "${{ inputs.aws_s3_path }}" == "cedana-alpha" ]]; then
            BUILD="alpha"
          fi

          mkdir -p previous

          PLUGINS=(
            "libcedana-cloud-hypervisor.so"
            "libcedana-containerd.so"
            "libcedana-crio.so"
            "libcedana-k8s.so"
            "libcedana-kata.so"
            "libcedana-runc.so"
            "libcedana-slurm.so"
            "libcedana-storage-cedana.so"
            "libcedana-storage-gcs.so"
            "libcedana-storage-s3.so"
          )

          for FILE in "${PLUGINS[@]}"; do
            curl -fL \
              "${CEDANA_URL}/plugins/download/${FILE}?version=${PREVIOUS_TAG}&arch=${ARCH}&build=${BUILD}" \
              -H "Authorization: Bearer $CEDANA_AUTH_TOKEN" \
              --output "previous/${FILE}"
            test -f "previous/${FILE}"
            test -s "previous/${FILE}"
          done

      - name: Download current plugin binaries
        env:
          CEDANA_URL: "https://rahul.cedana.ai/v2"
          CEDANA_AUTH_TOKEN: ${{ secrets.CEDANA_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          CURRENT_TAG="${{ steps.tag.outputs.tag }}"
          ARCH="${{ matrix.arch }}"

          BUILD=""
          if [[ "${{ inputs.aws_s3_path }}" == "cedana-alpha" ]]; then
            BUILD="alpha"
          fi

          mkdir -p current

          PLUGINS=(
            "libcedana-cloud-hypervisor.so"
            "libcedana-containerd.so"
            "libcedana-crio.so"
            "libcedana-k8s.so"
            "libcedana-kata.so"
            "libcedana-runc.so"
            "libcedana-slurm.so"
            "libcedana-storage-cedana.so"
            "libcedana-storage-gcs.so"
            "libcedana-storage-s3.so"
          )

          for FILE in "${PLUGINS[@]}"; do
            curl -fL \
              "${CEDANA_URL}/plugins/download/${FILE}?version=${CURRENT_TAG}&arch=${ARCH}&build=${BUILD}" \
              -H "Authorization: Bearer $CEDANA_AUTH_TOKEN" \
              --output "current/${FILE}"
            test -f "current/${FILE}"
            test -s "current/${FILE}"
          done

      - name: Get release info
        id: release-info
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          token: ${{ github.token }}
          excludes: draft
          repository: ${{ github.repository }}

      - name: Generate summary
        id: summary
        env:
          RELEASE_TITLE: "cedana"
          RELEASE_DESCRIPTION: "**${{ steps.tag.outputs.tag }}**"
          RELEASE_NOTES_URL: https://github.com/${{ github.repository }}/releases/${{ steps.tag.outputs.tag }}
          RELEASE_BODY: "${{ steps.release-info.outputs.description }}"
          TAG: ${{ steps.tag.outputs.tag }}
          BINARIES_DIR: current
          PREVIOUS_TAG: ${{ steps.previous-tag.outputs.tag }}
          PREVIOUS_BINARIES_DIR: previous
        run: |
          echo $RELEASE_BODY > $GITHUB_STEP_SUMMARY
          echo ::set-output name=slack-summary::$(scripts/ci/release-summary-slack)

      - name: Post summary
        id: slack-patch
        uses: slackapi/slack-github-action@v1.26.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_RELEASE }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        with:
          payload: |
            ${{ steps.summary.outputs.slack-summary }}
