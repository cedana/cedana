name: Download

# This workload downloads external dependencies (binaries)  and uploads them as artifacts,
# that can be used in other workflows.

permissions:
  contents: write

on:
  workflow_call:
    inputs:
      cedana_version:
        type: string
        description: Version for Cedana binaries (branch name, tag or "release" for latest release)
        required: false
        default: "none"
      criu_version:
        type: string
        description: Version for CRIU binaries (branch name, tag or "release" for latest release)
        required: false
        default: "none"
      gpu_version:
        type: string
        description: Version for GPU binaries (branch name, tag or "release" for latest release)
        required: false
        default: "none"
      streamer_version:
        type: string
        description: Version for streamer binaries (branch name, tag or "release" for latest release)
        required: false
        default: "none"
      controller_version:
        type: string
        description: Version for controller binaries (branch name, tag or "release" for latest release)
        required: false
        default: "none"
      containerd_runtime_version:
        type: string
        description: Version for containerd runtime binaries (branch name, tag or "release" for latest release)
        required: false
        default: "none"
      helm_chart_version:
        type: string
        description: Version for Cedana Helm chart (branch name, tag or "release" for latest release)
        required: false
        default: "none"
      slurm_version:
        type: string
        description: Version for cedana-slurm binaries (branch name, tag or "release" for latest release)
        required: false
        default: "none"

jobs:
  cedana:
    name: Cedana
    if: ${{ inputs.cedana_version != 'none' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Download cedana from S3
        env:
          CEDANA_URL: "https://rahul.cedana.ai/v2"
          CEDANA_AUTH_TOKEN: ${{ secrets.CEDANA_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p cedana
          cd cedana

          REF="${{ github.head_ref || github.ref_name }}"
          ARCH="${{ matrix.arch }}"
          FILE="cedana"

          curl -fL \
            "${CEDANA_URL}/plugins/download/${FILE}?version=${REF}&arch=${ARCH}&build=alpha" \
            -H "Authorization: Bearer $CEDANA_AUTH_TOKEN" \
            --output "$FILE"

          test -f "$FILE"
          test -s "$FILE"

      - name: Upload cedana
        uses: actions/upload-artifact@v4
        with:
          name: cedana-${{ matrix.arch }}
          path: ./cedana/*

      - name: Get digest
        env:
          IMAGE_NAME: ${{ (inputs.cedana_version == 'release' || startsWith(inputs.cedana_version, 'v')) && 'cedana/cedana-helper' || 'cedana/cedana-helper-test' }}
          TAG: ${{ inputs.cedana_version == 'release' && 'latest' || inputs.cedana_version }}
        run: |
          mkdir -p /tmp/digests
          mkdir -p /tmp/image-name
          TAG=$(echo $TAG | sed 's/\//-/g')
          docker pull --platform=linux/${{ matrix.arch }} $IMAGE_NAME:$TAG
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE_NAME:$TAG | cut -d'@' -f2)
          touch "/tmp/digests/${digest#sha256:}"
          echo "$IMAGE_NAME" > /tmp/image-name/name.txt

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error

      - name: Upload image name
        if: ${{ matrix.arch == 'amd64' }}
        uses: actions/upload-artifact@v4
        with:
          name: image-name
          path: /tmp/image-name/*
          if-no-files-found: error

  plugin:
    name: Plugin
    if: ${{ inputs.cedana_version != 'none' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        plugin:
          - runc
          - containerd
          - crio
          - kata
          - cloud-hypervisor
          - k8s
          - slurm
          - storage/cedana
          - storage/s3
          - storage/gcs
        arch:
          - amd64
          - arm64
    permissions:
      id-token: write # required for OIDC
      contents: read
    steps:
      - name: Set plugin name
        env:
          PLUGIN: ${{ matrix.plugin }}
        run: |
          PLUGIN=$(echo $PLUGIN | sed 's/\//-/g')
          echo "PLUGIN=$PLUGIN" >> $GITHUB_ENV

      - name: Download plugin from S3
        env:
          CEDANA_URL: "https://rahul.cedana.ai/v2"
          CEDANA_AUTH_TOKEN: ${{ secrets.CEDANA_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          REF="${{ github.head_ref || github.ref_name }}"
          ARCH="${{ matrix.arch }}"
          FILE="libcedana-${PLUGIN}.so"

          curl -fL \
            "${CEDANA_URL}/plugins/download/${FILE}?version=${REF}&arch=${ARCH}&build=alpha" \
            -H "Authorization: Bearer $CEDANA_AUTH_TOKEN" \
            --output "$FILE"

          test -f "$FILE"
          test -s "$FILE"

      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.arch }}-${{ env.PLUGIN }}
          path: |
            ./libcedana-*.so

  criu:
    name: CRIU
    if: ${{ inputs.criu_version != 'none' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        arch:
          - amd64
          - arm64
    permissions:
      id-token: write # required for OIDC
      contents: read
    steps:
      - name: Download CRIU from S3
        env:
          CEDANA_URL: "https://rahul.cedana.ai/v2"
          CEDANA_AUTH_TOKEN: ${{ secrets.CEDANA_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p criu

          VERSION="${{ inputs.criu_version }}"
          BUILD="alpha"
          if [ "$VERSION" = "main" ]; then
            BUILD=""
          fi
          ARCH="${{ matrix.arch }}"
          FILE="criu"

          curl -fL \
            "${CEDANA_URL}/plugins/download/${FILE}?version=${VERSION}&arch=${ARCH}&build=${BUILD}" \
            -H "Authorization: Bearer $CEDANA_AUTH_TOKEN" \
            --output "criu/${FILE}"

          test -f "criu/${FILE}"
          test -s "criu/${FILE}"

      - name: Upload CRIU
        uses: actions/upload-artifact@v4
        with:
          name: criu-${{ matrix.arch }}
          path: ./criu/*

  gpu:
    name: GPU
    if: ${{ inputs.gpu_version != 'none' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        arch:
          - amd64
          - arm64
    permissions:
      id-token: write # required for OIDC
      contents: read
    steps:
      - name: Download GPU binaries from S3
        env:
          CEDANA_URL: "https://rahul.cedana.ai/v2"
          CEDANA_AUTH_TOKEN: ${{ secrets.CEDANA_AUTH_TOKEN }}
          VERSION: ${{ inputs.gpu_version == 'release' && 'latest' || inputs.gpu_version }}
        run: |
          set -euo pipefail
          VERSION=$(echo $VERSION | sed 's/\//-/g')
          BUILD="alpha"
          if [ "${VERSION#v}" != "$VERSION" ] || [ "$VERSION" = "latest" ] || [ "$VERSION" = "main" ]; then
            BUILD=""
          fi
          mkdir -p gpu

          ARCH="${{ matrix.arch }}"
          for FILE in cedana-gpu-controller libcedana-gpu.so libcedana-gpu-tracer.so; do
            curl -fL \
              "${CEDANA_URL}/plugins/download/${FILE}?version=${VERSION}&arch=${ARCH}&build=${BUILD}" \
              -H "Authorization: Bearer $CEDANA_AUTH_TOKEN" \
              --output "gpu/${FILE}"
            test -f "gpu/${FILE}"
            test -s "gpu/${FILE}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gpu-${{ matrix.arch }}
          path: ./gpu/*

  streamer:
    name: Streamer
    if: ${{ inputs.streamer_version != 'none' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        arch:
          - amd64
          - arm64
    permissions:
      id-token: write # required for OIDC
      contents: read
    steps:
      - name: Download streamer from S3
        env:
          CEDANA_URL: "https://rahul.cedana.ai/v2"
          CEDANA_AUTH_TOKEN: ${{ secrets.CEDANA_AUTH_TOKEN }}
          VERSION: ${{ inputs.streamer_version == 'release' && 'latest' || inputs.streamer_version }}
        run: |
          set -euo pipefail
          VERSION=$(echo $VERSION | sed 's/\//-/g')
          BUILD="alpha"
          if [ "${VERSION#v}" != "$VERSION" ] || [ "$VERSION" = "latest" ]; then
            BUILD=""
          fi
          mkdir -p streamer

          ARCH="${{ matrix.arch }}"
          FILE="cedana-image-streamer"

          curl -fL \
            "${CEDANA_URL}/plugins/download/${FILE}?version=${VERSION}&arch=${ARCH}&build=${BUILD}" \
            -H "Authorization: Bearer $CEDANA_AUTH_TOKEN" \
            --output "streamer/${FILE}"

          test -f "streamer/${FILE}"
          test -s "streamer/${FILE}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: streamer-${{ matrix.arch }}
          path: ./streamer/*

  controller:
    name: Controller
    if: ${{ inputs.controller_version != 'none' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get digest
        env:
          IMAGE_NAME: ${{ (inputs.controller_version == 'release' || startsWith(inputs.controller_version, 'v')) && 'cedana/cedana-controller' || 'cedana/cedana-controller-test' }}
          TAG: ${{ inputs.controller_version == 'release' && 'latest' || inputs.controller_version }}
        run: |
          mkdir -p /tmp/digests
          mkdir -p /tmp/image-name
          TAG=$(echo $TAG | sed 's/\//-/g')
          docker pull --platform=linux/${{ matrix.arch }} $IMAGE_NAME:$TAG
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE_NAME:$TAG | cut -d'@' -f2)
          touch "/tmp/digests/${digest#sha256:}"
          echo "$IMAGE_NAME" > /tmp/image-name/name.txt

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: controller-digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error

      - name: Upload image name
        if: ${{ matrix.arch == 'amd64' }}
        uses: actions/upload-artifact@v4
        with:
          name: controller-image-name
          path: /tmp/image-name/*
          if-no-files-found: error

  containerd-runtime-runc:
    name: Containerd Runtime
    if: ${{ inputs.containerd_runtime_version != 'none' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        arch:
          - amd64
          - arm64
    permissions:
      id-token: write # required for OIDC
      contents: read
    steps:
      - name: Download runtime from S3
        env:
          CEDANA_URL: "https://rahul.cedana.ai/v2"
          CEDANA_AUTH_TOKEN: ${{ secrets.CEDANA_AUTH_TOKEN }}
          VERSION: ${{ inputs.containerd_runtime_version == 'release' && 'latest' || inputs.containerd_runtime_version }}
        run: |
          set -euo pipefail
          VERSION=$(echo $VERSION | sed 's/\//-/g')
          BUILD="alpha"
          if [ "${VERSION#v}" != "$VERSION" ] || [ "$VERSION" = "latest" ]; then
            BUILD=""
          fi
          mkdir -p containerd-runtime-runc

          ARCH="${{ matrix.arch }}"
          FILE="cedana-shim-runc-v2"

          curl -fL \
            "${CEDANA_URL}/plugins/download/${FILE}?version=${VERSION}&arch=${ARCH}&build=${BUILD}" \
            -H "Authorization: Bearer $CEDANA_AUTH_TOKEN" \
            --output "containerd-runtime-runc/${FILE}"

          test -f "containerd-runtime-runc/${FILE}"
          test -s "containerd-runtime-runc/${FILE}"

      - name: Upload runtime runc artifacts
        uses: actions/upload-artifact@v4
        with:
          name: containerd-runtime-${{ matrix.arch }}-runc
          path: ./containerd-runtime-runc/*

  helm-chart:
    name: Helm Chart
    if: ${{ inputs.helm_chart_version != 'none' }}
    runs-on: ubuntu-latest
    steps:
      - name: Get tag
        id: get_tag
        env:
          VERSION: ${{ inputs.helm_chart_version }}
        run: |
          if [ "$VERSION" = "release" ]; then
            tag=$(curl -s https://api.github.com/repos/cedana/cedana-helm-charts/releases/latest | jq -r .tag_name)
            echo "tag=$tag" >> $GITHUB_OUTPUT
          else
            echo "tag=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: cedana/cedana-helm-charts
          ref: ${{ steps.get_tag.outputs.tag }}

      - name: Upload helm chart
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: cedana-helm
